<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Character Counter</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: linear-gradient(135deg, #11998e, #38ef7d);
      color: #fff;
    }

    .main {
      background-color: #1e272e;
      padding: 45px 40px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
      width: 450px;
      border: 2px solid #38ef7d;
    }

    h2 {
      margin-top: 0;
      margin-bottom: 20px;
      text-align: center;
      font-size: 26px;
    }

    .textarea {
      width: 100%;
      height: 150px;
      padding: 15px;
      background-color: #2f3640;
      border: 2px solid #718093;
      border-radius: 8px;
      color: #fff;
      font-size: 16px;
      resize: none;
      box-sizing: border-box;
      outline: none;
      margin-bottom: 25px;
    }

    .textarea:focus {
      border-color: #38ef7d;
    }

    .counter-box {
      display: flex;
      justify-content: space-between;
    }

    .count-item {
      background-color: #2f3640;
      padding: 12px;
      border-radius: 8px;
      width: 47%;
      text-align: center;
      font-weight: bold;
    }

    .number {
      font-size: 26px;
      display: block;
      margin-top: 5px;
      color: #ffdd59;
    }
  </style>
</head>
<body>

  <div class="main">
    <h2>Character Counter</h2>
    <textarea class="textarea" id="textarea" placeholder="Type your text here..." maxlength="150"></textarea>
    
    <div class="counter-box">
      <div class="count-item">
        Total Characters
        <span class="number" id="total">0</span>
      </div>
      <div class="count-item">
        Remaining Characters
        <span class="number" id="remaining">150</span>
      </div>
    </div>
  </div>

  <script>
    let textarea = document.getElementById('textarea');
    let total = document.getElementById('total');
    let remaining = document.getElementById('remaining');

    textarea.addEventListener('keyup', function() {
      updateCounts();
    });

    function updateCounts() {
      let currentLength = textarea.value.length;
      total.innerText = currentLength;
      remaining.innerText = 150 - currentLength;
    }
  </script>

</body>
</html>
