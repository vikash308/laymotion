<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Slider</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: linear-gradient(135deg, #f857a6, #ff5858);
      color: #fff;
    }

    .main {
      background-color: #1e272e;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
      width: 600px;
      border: 2px solid #ff5858;
    }

    h2 {
      margin-top: 0;
      margin-bottom: 20px;
      text-align: center;
      font-size: 26px;
    }

    .slider {
      position: relative;
      width: 100%;
      height: 350px;
      overflow: hidden;
      border-radius: 8px;
    }

    .slide {
      display: none;
      width: 100%;
      height: 100%;
    }

    .slide.active {
      display: block;
    }

    .slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background-color: rgba(0, 0, 0, 0.6);
      color: #fff;
      border: none;
      padding: 15px;
      cursor: pointer;
      font-size: 20px;
      font-weight: bold;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
    }

    .btn:hover {
      background-color: rgba(0, 0, 0, 0.8);
    }

    .prev {
      left: 15px;
    }

    .next {
      right: 15px;
    }
  </style>
</head>
<body>

  <div class="main">
    <h2>Image Slider</h2>
    
    <div class="slider">
      <div class="slide active">
        <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=600&auto=format&fit=crop&q=80" alt="Nature 1">
      </div>
      <div class="slide">
        <img src="https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=600&auto=format&fit=crop&q=80" alt="Nature 2">
      </div>
      <div class="slide">
        <img src="https://images.unsplash.com/photo-1447752875215-b2761acb3c5d?w=600&auto=format&fit=crop&q=80" alt="Nature 3">
      </div>
      <div class="slide">
        <img src="https://images.unsplash.com/photo-1469474968028-56623f02e42e?w=600&auto=format&fit=crop&q=80" alt="Nature 4">
      </div>

      <button class="btn prev" onclick="changeSlide(-1)">&#10094;</button>
      <button class="btn next" onclick="changeSlide(1)">&#10095;</button>
    </div>
  </div>

  <script>
    let currentSlide = 0;
    const slides = document.querySelectorAll('.slide');

    function changeSlide(direction) {
      slides[currentSlide].classList.remove('active');

      currentSlide = currentSlide + direction;

      if (currentSlide >= slides.length) {
        currentSlide = 0;
      }
      if (currentSlide < 0) {
        currentSlide = slides.length - 1;
      }

      slides[currentSlide].classList.add('active');
    }
  </script>

</body>
</html>
